{% extends 'base.html' %}
{% block content %}

<h2>Low Stock Medicines</h2>

<table class="table table-bordered">

<tr>
<th>Medicine</th>
<th>Company</th>
<th>Stock</th>
<th>Status</th>
</tr>

{% for medicine in medicines %}

<tr>
<td>{{ medicine.name }}</td>
<td>{{ medicine.company.name }}</td>
<td>{{ medicine.quantity }}</td>
<td style="color:red;">⚠ Low Stock</td>
</tr>

{% empty %}

<tr>
<td colspan="4">No low stock medicines</td>
</tr>

{% endfor %}

</table>

{% endblock %}
