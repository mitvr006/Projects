{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">

<h2 class="mb-4 fw-bold">📊 Medical Dashboard</h2>

<div class="row g-4">

<!-- Companies -->
<div class="col-12 col-sm-6 col-md-3">
<div class="card shadow-lg border-0 text-center p-3">
<h5 class="text-muted">Total Companies</h5>
<h2 class="fw-bold text-primary">{{ total_companies }}</h2>
</div>
</div>

<!-- Medicines -->
<div class="col-12 col-sm-6 col-md-3">
<div class="card shadow-lg border-0 text-center p-3">
<h5 class="text-muted">Total Medicines</h5>
<h2 class="fw-bold text-success">{{ total_medicines }}</h2>
</div>
</div>

<!-- Sales -->
<div class="col-12 col-sm-6 col-md-3">
<div class="card shadow-lg border-0 text-center p-3">
<h5 class="text-muted">Total Sales</h5>
<h2 class="fw-bold text-warning">{{ total_sales }}</h2>
</div>
</div>

<!-- Revenue -->
<div class="col-12 col-sm-6 col-md-3">
<div class="card shadow-lg border-0 text-center p-3">
<h5 class="text-muted">Total Revenue</h5>
<h2 class="fw-bold text-danger">₹{{ total_revenue }}</h2>
</div>
</div>

</div>

<!-- Chart -->
<div class="card mt-5 shadow-lg border-0 p-4">
<h4 class="mb-3">📈 Last 7 Days Sales</h4>
<canvas id="salesChart"></canvas>
</div>

</div>

{% endblock %}
