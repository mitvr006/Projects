{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">

<!-- Title -->
<h2 class="text-center fw-bold mb-4">🧾 Create Sale</h2>

<!-- Error -->
{% if error %}
<div class="alert alert-danger text-center">
    {{ error }}    
</div>
{% endif %}

<!-- Form Card -->
<div class="row justify-content-center">
<div class="col-md-8 col-lg-6">

<form method="post" class="card shadow-lg p-4 border-0">
{% csrf_token %}

<!-- Fields -->
<div class="mb-3">
    <label class="form-label fw-semibold">Medicine</label>
    {{ form.medicine }}
</div>

<div class="mb-3">
    <label class="form-label fw-semibold">Quantity</label>
    {{ form.quantity }}
</div>

<!-- Button -->
<div class="d-grid mt-3">
<button class="btn btn-success btn-lg">
    Generate Bill 💰
</button>
</div>

</form>

</div>
</div>

</div>

{% endblock %}
