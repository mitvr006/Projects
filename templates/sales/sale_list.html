{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">

<!-- Header -->
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="fw-bold">💰 Sales List</h3>
    <a class="btn btn-success" href="{% url 'sale_create' %}">
        + Create Sale
    </a>
</div>

<!-- Table Card -->
<div class="card shadow-lg border-0">
<div class="table-responsive">

<table class="table table-hover align-middle mb-0">

<thead class="table-dark text-center">
<tr>
    <th>Medicine</th>
    <th>Quantity</th>
    <th>Total Price</th>
    <th>Date</th>
</tr>
</thead>

<tbody class="text-center">
{% for sale in sales %}
<tr>
    <td class="fw-semibold">{{ sale.medicine.name }}</td>

    <td>
        <span class="badge bg-primary">
            {{ sale.quantity }}
        </span>
    </td>

    <td class="text-success fw-bold">
        ₹{{ sale.total_price }}
    </td>

    <td>
        {{ sale.date }}
    </td>
</tr>
{% endfor %}
</tbody>

</table>

</div>
</div>

</div>

{% endblock %}
